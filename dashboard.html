<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diagnostics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 30px;
}
.chart-container {
    width: 900px;
    margin-bottom: 50px;
}
</style>
</head>

<body>

<h2>Diagnostics Performance Graphs</h2>

<div class="chart-container">
<canvas id="fpsChart"></canvas>
</div>

<div class="chart-container">
<canvas id="latencyChart"></canvas>
</div>

<div class="chart-container">
<canvas id="memoryChart"></canvas>
</div>

<script>

const labels = Array.from({length: 80}, (_, i) => i+1);

const fps = [
0,0,0,2,28,30,23,33,23,30,30,30,30,30,30,23,30,30,30,30,
30,29,28,20,20,20,24,18,18,20,12,20,23,14,32,7,20,17,16,20,
14,18,20,20,19,20,20,20,20,20,20,20,19,20,20,20,20,20,20,20,
24,30,22,25,19,15,17,20,21,20,20,20,20,20,20,19,20,20,20,20
];

const latency = [
0,0,0,0,6.5,5.1,5.2,3.3,4.7,5.8,4.7,5.2,4.9,4.8,5.3,3.6,4.1,4.1,4.9,5.1,
4.3,5.0,4.3,5.2,4.9,3.9,5.0,3.5,4.8,6.9,3.8,5.0,3.7,5.0,3.8,5.9,5.3,4.3,3.6,5.2,

4.3,4.5,3.9,5.0,3.3,4.3,7.3,4.6,5.5,5.7,6.5,5.7,5.5,6.0,5.6,5.8,5.4,5.2,4.7,5.6

const memory = [
123.4,123.9,123.9,125.0,113.2,112.4,110.4,77.5,79.2,79.4,79.2,79.3,79.4,79.5,79.5,
82.3,82.4,82.7,82.4,82.3,82.5,82.5,82.5,82.4,80.9,80.8,78.8,81.8,84.5,84.6,82.0,
84.8,99.5,99.6,101.7,101.7,94.7,97.4,99.4,99.1,103.8,104.0,104.1,104.2,103.8,103.9,
103.5,103.6,103.5,103.4,103.4,101.2,101.2,101.2,101.2,101.2,101.2,101.3,101.4,101.7,

];

function createChart(canvasId, label, data) {
    new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: label,
                data: data,
                fill: false,
                tension: 0.2
            }]
        },
        options: {
            responsive: true,
            scales: {
                x: { title: { display: true, text: "Sample" }},
                y: { title: { display: true, text: label }}
            }
        }
    });
}

createChart("fpsChart","FPS",fps);
createChart("latencyChart","Latency (ms)",latency);
createChart("memoryChart","Memory (MB)",memory);

</script>

</body>
</html>
